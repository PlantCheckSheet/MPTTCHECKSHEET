<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plant Pre-Start Inspection</title>

<style>
*{
box-sizing:border-box;
font-family:"Segoe UI",Arial,sans-serif;
}

:root{
--bgImage:url("excavator.jpg");
--primary:#f4b400;
--primary-dark:#c99200;
--success:#2ecc71;
--danger:#e74c3c;
--text:#1f2933;
--muted:#64748b;
--border:#d7dee6;
--panel-soft:rgba(255,255,255,0.96);
--shadow:0 14px 34px rgba(0,0,0,0.18);
}

html, body{
overflow-x:hidden;
}

body{
margin:0;
color:white;
min-height:100vh;
background:#3f454b;
touch-action:pan-y;
}

body::before{
content:"";
position:fixed;
inset:0;
background:
linear-gradient(rgba(15,23,42,0.72), rgba(15,23,42,0.78)),
var(--bgImage);
background-size:cover;
background-position:center;
background-repeat:no-repeat;
z-index:-2;
transition:background-image .4s ease;
}

.app-header{
background:linear-gradient(90deg, rgba(244,180,0,0.97), rgba(224,164,0,0.97));
color:#111;
border-bottom:3px solid rgba(0,0,0,0.14);
box-shadow:0 8px 24px rgba(0,0,0,0.16);
text-align:center;
padding:22px;
}

.header-title p{
margin:0;
font-size:12px;
font-weight:700;
letter-spacing:1px;
text-transform:uppercase;
}

.header-title h1{
margin:4px 0;
font-size:28px;
}

.header-sub{
font-size:13px;
font-weight:600;
}

.logo-section{
text-align:center;
padding:8px 20px 2px 20px;
}

.logo-section img{
width:100%;
max-width:250px;
height:auto;
display:block;
margin:0 auto;
}

.container{
max-width:860px;
margin:10px auto 28px;
padding:0 16px 28px;
width:100%;
overflow-x:hidden;
}

.form-shell{
background:rgba(255,255,255,0.08);
border-radius:18px;
padding:18px;
}

.card{
background:var(--panel-soft);
color:var(--text);
border-radius:14px;
padding:20px;
margin-bottom:18px;
border:1px solid rgba(15,23,42,0.08);
box-shadow:var(--shadow);
}

.card h2{
margin:0 0 16px 0;
font-size:18px;
border-bottom:2px solid var(--primary);
padding-bottom:6px;
}

.card-intro{
margin:-6px 0 14px 0;
color:var(--muted);
font-size:14px;
}

.progress-wrap{
display:flex;
flex-direction:column;
gap:8px;
margin:-4px 0 14px 0;
}

.progress-text{
font-size:14px;
font-weight:700;
color:var(--text);
}

.progress-bar{
width:100%;
height:10px;
background:#e8edf2;
border-radius:999px;
overflow:hidden;
}

.progress-fill{
height:100%;
width:0%;
background:linear-gradient(90deg, #f4b400, #e0a400);
border-radius:999px;
transition:width .25s ease;
}

.form-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:14px;
}

.form-group{
display:flex;
flex-direction:column;
min-width:0;
}

label{
font-weight:700;
margin-bottom:6px;
}

input,select,textarea{
width:100%;
max-width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ccc;
font-size:15px;
}

select:disabled{
background:#f1f5f9;
color:#64748b;
cursor:not-allowed;
}

textarea{
min-height:120px;
resize:vertical;
}

.static-field{
width:100%;
max-width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ccc;
font-size:15px;
background:#f8fafc;
color:#334155;
font-weight:600;
}

.check-list{
border:1px solid var(--border);
border-radius:12px;
overflow:hidden;
background:#fff;
}

.check-item{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 16px;
border-bottom:1px solid #e8edf2;
gap:12px;
transition:background-color .2s ease, border-left .2s ease;
min-width:0;
}

.check-item.hidden-check{
display:none;
}

.check-item.defect-selected{
background:#fff1f0;
border-left:5px solid var(--danger);
}

.btn-group{
display:flex;
gap:8px;
flex-wrap:wrap;
}

.status-btn{
border:none;
padding:10px 14px;
border-radius:8px;
font-weight:700;
cursor:pointer;
min-width:80px;
}

.ok{
background:#2ecc71;
color:white;
}

.defect{
background:#e74c3c;
color:white;
}

.submit-btn{
width:100%;
background:#f4b400;
border:none;
padding:16px;
border-radius:10px;
font-size:18px;
font-weight:700;
cursor:pointer;
}

.submit-btn:disabled{
opacity:0.7;
cursor:not-allowed;
}

.footer{
text-align:center;
font-size:12px;
padding:12px;
}

.success-popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#2ecc71;
color:white;
padding:20px 28px;
border-radius:12px;
font-weight:600;
font-size:18px;
display:none;
box-shadow:0 10px 25px rgba(0,0,0,0.35);
z-index:999;
text-align:center;
max-width:90vw;
}

@media (max-width:640px){
.form-grid{
grid-template-columns:1fr;
}
.check-item{
flex-direction:column;
align-items:stretch;
}
.btn-group{
width:100%;
}
.status-btn{
flex:1;
}
.logo-section{
padding:6px 16px 0 16px;
}
.logo-section img{
max-width:125px;
}
.container{
margin:6px auto 24px;
padding:0 16px 24px;
}
.form-shell{
padding:14px;
}
.card{
padding:16px;
}
}
</style>
</head>

<body>

<div class="app-header">
<div class="header-title">
<p>Site Safety Inspection Record</p>
<h1>Plant Pre-Start Inspection</h1>
<div class="header-sub">Daily Operator Machinery Check</div>
</div>
</div>

<div class="logo-section">
<img src="logo.png" alt="Company Logo">
</div>

<div class="container">
<div class="form-shell">

<form
id="inspectionForm"
method="POST"
action="https://script.google.com/macros/s/AKfycbwkBWURBm9FS-EuqS0L-yHG7PsY7kfgt8EoLjEXbVceDwbS-0s72alPkxTwy1oOeySB/exec"
>

<div class="card">
<h2>Operator Details</h2>

<div class="form-grid">
<div class="form-group">
<label>Operator Name</label>
<select id="operatorSelect" name="operator" required>
<option value="">Select Operator</option>
<option value="Christian Evans">Christian Evans</option>
<option value="Guy Millichip">Guy Millichip</option>
<option value="Matthew Brady">Matthew Brady</option>
<option value="Colin Ecclestone">Colin Ecclestone</option>
<option value="Craig Harvey">Craig Harvey</option>
<option value="Stuart Evans">Stuart Evans</option>
<option value="Mark Ford">Mark Ford</option>
</select>
</div>

<div class="form-group">
<label>Site Location</label>
<div class="static-field">MPTT</div>
<input type="hidden" name="siteLocation" value="MPTT">
</div>

<div class="form-group">
<label>Plant Type</label>
<select id="plantType" name="plantType" required disabled>
<option value="">Select Operator First</option>
</select>
</div>

<div class="form-group">
<label>Machine ID</label>
<input name="machineID" required>
</div>
</div>
</div>

<div class="card">
<h2>Machine Checks</h2>
<p class="card-intro">Only checks relevant to the selected plant will be shown.</p>

<div class="progress-wrap">
<div id="progressText" class="progress-text">0/0 checks complete</div>
<div class="progress-bar">
<div id="progressFill" class="progress-fill"></div>
</div>
</div>

<div id="checkList" class="check-list"></div>
</div>

<div class="card">
<h2>Defect Notes</h2>
<textarea id="defectNotes" name="defectNotes"></textarea>
</div>

<button id="submitBtn" class="submit-btn" type="submit">Complete Inspection</button>

</form>
</div>
</div>

<div class="footer">Plant Inspection System</div>

<div id="successPopup" class="success-popup">
Inspection Submitted Successfully ✔
</div>

<script>
const ALL_ASSIGNED_PLANTS = [
  "Mini Digger",
  "Hitachi 01",
  "Hitachi 02",
  "Dumper",
  "Roller",
  "Telehandler",
  "ADT",
  "Loading Shovel",
  "Mobile Crane",
  "Generator",
  "MEWP"
];

const operatorPlantMap = {
  "Christian Evans": ["Dumper", "Roller"],
  "Guy Millichip": ["Mobile Crane"],
  "Matthew Brady": ["Mini Digger"],
  "Colin Ecclestone": ["Loading Shovel", "ADT"],
  "Craig Harvey": ["Hitachi 01"],
  "Stuart Evans": ["Hitachi 02"],
  "Mark Ford": ["Telehandler"]
};

const plantImages = {
  "Mini Digger": "excavator.jpg",
  "Hitachi 01": "excavator.jpg",
  "Hitachi 02": "excavator.jpg",
  "Dumper": "dumper.jpg",
  "Roller": "roller.jpg",
  "Telehandler": "telehandler.jpg",
  "ADT": "adt.jpg",
  "Loading Shovel": "shovel-loader.jpg",
  "Mobile Crane": "mobile-crane.jpg",
  "Generator": "generator.jpg",
  "MEWP": "mewp.jpg"
};

const checkDefinitions = [
  { label: "Fluid Leaks", name: "fluidLeaks", plants: ["Mini Digger","Hitachi 01","Hitachi 02","Dumper","Roller","Telehandler","ADT","Loading Shovel","Mobile Crane","Generator","MEWP"] },
  { label: "Engine Oil", name: "engineOil", plants: ["Mini Digger","Hitachi 01","Hitachi 02","Dumper","Roller","Telehandler","ADT","Loading Shovel","Mobile Crane","Generator"] },
  { label: "Coolant", name: "coolant", plants: ["Mini Digger","Hitachi 01","Hitachi 02","Dumper","Roller","Telehandler","ADT","Loading Shovel","Mobile Crane"] },
  { label: "Lights", name: "lights", plants: ["Mini Digger","Hitachi 01","Hitachi 02","Dumper","Roller","Telehandler","ADT","Loading Shovel","Mobile Crane","MEWP"] },
  { label: "Horn / Alarm", name: "alarm", plants: ["Mini Digger","Hitachi 01","Hitachi 02","Dumper","Roller","Telehandler","ADT","Loading Shovel","Mobile Crane","MEWP"] },
  { label: "Controls", name: "controls", plants: ["Mini Digger","Hitachi 01","Hitachi 02","Dumper","Roller","Telehandler","ADT","Loading Shovel","Mobile Crane","Generator","MEWP"] },
  { label: "Hydraulic Hoses", name: "hydraulicHoses", plants: ["Mini Digger","Hitachi 01","Hitachi 02","Telehandler","Loading Shovel","Mobile Crane"] },
  { label: "Tracks / Tyres", name: "tracks", plants: ["Mini Digger","Hitachi 01","Hitachi 02","Dumper","Roller","Telehandler","ADT","Loading Shovel"] },
  { label: "Boom / Dipper / Bucket", name: "boomDipperBucket", plants: ["Mini Digger","Hitachi 01","Hitachi 02"] },
  { label: "Body / Skip Condition", name: "bodySkipCondition", plants: ["Dumper","ADT"] },
  { label: "Drum Condition", name: "drumCondition", plants: ["Roller"] },
  { label: "Water Spray System", name: "waterSpraySystem", plants: ["Roller"] },
  { label: "Forks / Carriage", name: "forksCarriage", plants: ["Telehandler"] },
  { label: "Bucket / Linkage", name: "bucketLinkage", plants: ["Loading Shovel"] },
  { label: "Hook / Chains / Lifting Gear", name: "hookChainsLiftingGear", plants: ["Mobile Crane"] },
  { label: "Outriggers", name: "outriggers", plants: ["Mobile Crane"] },
  { label: "Fuel Level / Fuel Leaks", name: "generatorFuelLeaks", plants: ["Generator"] },
  { label: "Sockets / Outlets", name: "generatorSockets", plants: ["Generator"] },
  { label: "Cables / Leads", name: "generatorCables", plants: ["Generator"] },
  { label: "Emergency Stop", name: "generatorEmergencyStop", plants: ["Generator"] },
  { label: "Tyres / Wheels", name: "mewpTyres", plants: ["MEWP"] },
  { label: "MEWP Hydraulic Hoses", name: "mewpHydraulicHoses", plants: ["MEWP"] },
  { label: "Guard Rails / Gate", name: "mewpGuardRailsGate", plants: ["MEWP"] },
  { label: "Emergency Lowering Controls", name: "mewpEmergencyLowering", plants: ["MEWP"] },
  { label: "Platform Controls", name: "mewpPlatformControls", plants: ["MEWP"] },
  { label: "Tilt Alarm / Safety Devices", name: "mewpTiltAlarm", plants: ["MEWP"] },
  { label: "Machines Greased", name: "machinesGreased", plants: ALL_ASSIGNED_PLANTS },
  { label: "Jet Washed / Cleaned", name: "jetWashedCleaned", plants: ALL_ASSIGNED_PLANTS }
];

const operatorSelect = document.getElementById("operatorSelect");
const plantType = document.getElementById("plantType");
const form = document.getElementById("inspectionForm");
const popup = document.getElementById("successPopup");
const submitBtn = document.getElementById("submitBtn");
const progressText = document.getElementById("progressText");
const progressFill = document.getElementById("progressFill");
const defectNotes = document.getElementById("defectNotes");
const checkList = document.getElementById("checkList");

buildChecks();

operatorSelect.addEventListener("change", function () {
  const selectedOperator = this.value;
  resetChecksAndProgress();
  populatePlantOptions(selectedOperator);
});

plantType.addEventListener("change", function () {
  applySelectedPlant(this.value);
});

function buildChecks() {
  checkList.innerHTML = "";

  checkDefinitions.forEach(check => {
    const item = document.createElement("div");
    item.className = "check-item hidden-check";
    item.dataset.plants = check.plants.join(",");

    item.innerHTML = `
      <div>${check.label}</div>
      <div class="btn-group">
        <button type="button" class="status-btn ok">OK</button>
        <button type="button" class="status-btn defect">Defect</button>
        <input type="hidden" name="${check.name}">
      </div>
    `;

    const okBtn = item.querySelector(".ok");
    const defectBtn = item.querySelector(".defect");

    okBtn.addEventListener("click", () => setCheck(okBtn, "OK"));
    defectBtn.addEventListener("click", () => setCheck(defectBtn, "Defect"));

    checkList.appendChild(item);
  });
}

function populatePlantOptions(operatorName) {
  plantType.innerHTML = "";

  if (!operatorName || !operatorPlantMap[operatorName]) {
    plantType.disabled = true;
    plantType.innerHTML = '<option value="">Select Operator First</option>';
    document.documentElement.style.setProperty("--bgImage",'url("excavator.jpg")');
    updateVisibleChecks("");
    updateProgress();
    return;
  }

  const plants = operatorPlantMap[operatorName];
  plantType.disabled = false;

  const defaultOption = document.createElement("option");
  defaultOption.value = "";
  defaultOption.textContent = "Select Plant";
  plantType.appendChild(defaultOption);

  plants.forEach(plant => {
    const option = document.createElement("option");
    option.value = plant;
    option.textContent = plant;
    plantType.appendChild(option);
  });

  if (plants.length === 1) {
    plantType.value = plants[0];
    applySelectedPlant(plants[0]);
  } else {
    plantType.value = "";
    document.documentElement.style.setProperty("--bgImage",'url("excavator.jpg")');
    updateVisibleChecks("");
    updateProgress();
  }
}

function applySelectedPlant(selectedPlant) {
  const img = plantImages[selectedPlant] || "excavator.jpg";
  document.documentElement.style.setProperty("--bgImage", `url("${img}")`);
  updateVisibleChecks(selectedPlant);
  updateProgress();
}

function getCheckItems() {
  return document.querySelectorAll(".check-item");
}

function updateVisibleChecks(selectedPlant) {
  getCheckItems().forEach(item => {
    const plants = item.dataset.plants ? item.dataset.plants.split(",") : [];
    const hiddenInput = item.querySelector("input[type='hidden']");
    const buttons = item.querySelectorAll("button");

    if (selectedPlant && plants.includes(selectedPlant)) {
      item.classList.remove("hidden-check");
    } else {
      item.classList.add("hidden-check");
      item.classList.remove("defect-selected");

      if (hiddenInput) {
        hiddenInput.value = "";
      }

      buttons.forEach(btn => {
        btn.style.opacity = 1;
      });
    }
  });
}

function resetChecksAndProgress() {
  getCheckItems().forEach(item => {
    item.classList.add("hidden-check");
    item.classList.remove("defect-selected");

    const hiddenInput = item.querySelector("input[type='hidden']");
    const buttons = item.querySelectorAll("button");

    if (hiddenInput) {
      hiddenInput.value = "";
    }

    buttons.forEach(btn => {
      btn.style.opacity = 1;
    });
  });

  defectNotes.value = "";
  updateProgress();
}

function updateProgress() {
  const visibleChecks = Array.from(document.querySelectorAll(".check-item:not(.hidden-check) input[type='hidden']"));
  const totalChecks = visibleChecks.length;
  const completedChecks = visibleChecks.filter(input => input.value.trim() !== "").length;
  const percent = totalChecks > 0 ? (completedChecks / totalChecks) * 100 : 0;

  progressText.textContent = `${completedChecks}/${totalChecks} checks complete`;
  progressFill.style.width = `${percent}%`;
}

function triggerDefectFeedback() {
  if (navigator.vibrate) {
    navigator.vibrate([120, 80, 120]);
  }
}

function setCheck(btn, value) {
  const container = btn.parentElement;
  const hidden = container.querySelector("input");
  const buttons = container.querySelectorAll("button");
  const checkItem = btn.closest(".check-item");

  hidden.value = value;
  buttons.forEach(b => b.style.opacity = 0.4);
  btn.style.opacity = 1;

  if (value === "Defect") {
    checkItem.classList.add("defect-selected");
    triggerDefectFeedback();
    alert("⚠ DEFECT RECORDED\n\nPlease report this to site management.");
  } else {
    checkItem.classList.remove("defect-selected");
  }

  updateProgress();
}

form.addEventListener("submit", async function (e) {
  e.preventDefault();

  if (operatorSelect.value === "") {
    alert("⚠ Please select an operator before submitting.");
    return;
  }

  if (plantType.value === "") {
    alert("⚠ Please select a plant type before submitting.");
    return;
  }

  const visibleCheckItems = Array.from(document.querySelectorAll(".check-item:not(.hidden-check)"));
  const visibleChecks = visibleCheckItems.map(item => item.querySelector("input[type='hidden']"));
  const hasUnanswered = visibleChecks.some(input => input.value.trim() === "");
  const hasDefect = visibleChecks.some(input => input.value === "Defect");
  const notes = defectNotes.value.trim();

  if (visibleChecks.length === 0) {
    alert("⚠ No checks are available for the selected plant.");
    return;
  }

  if (hasUnanswered) {
    alert("⚠ Please complete every check.");
    return;
  }

  if (hasDefect && notes === "") {
    alert("⚠ Please describe the defect.");
    defectNotes.focus();
    return;
  }

  submitBtn.disabled = true;
  submitBtn.textContent = "Completing Inspection...";

  try {
    const formData = new FormData();

    formData.append("operator", form.querySelector('[name="operator"]').value);
    formData.append("site", "MPTT");
    formData.append("siteLocation", "MPTT");
    formData.append("plantType", form.querySelector('[name="plantType"]').value);
    formData.append("machineId", form.querySelector('[name="machineID"]').value);
    formData.append("notes", form.querySelector('[name="defectNotes"]').value);

    const checks = visibleCheckItems.map(item => {
      const checkName = item.querySelector(":scope > div:first-child").textContent.trim();
      const result = item.querySelector('input[type="hidden"]').value.trim();

      return {
        checkName,
        result
      };
    });

    formData.append("checks", JSON.stringify(checks));

    const response = await fetch(form.action, {
      method: "POST",
      body: formData,
      redirect: "follow"
    });

    const text = await response.text();

    let result;
    try {
      result = JSON.parse(text);
    } catch (err) {
      throw new Error(text || "No response received from the web app.");
    }

    if (result.result !== "success") {
      throw new Error(result.message || "Submission failed");
    }

    popup.style.display = "block";

    setTimeout(() => {
      popup.style.display = "none";
      form.reset();

      plantType.disabled = true;
      plantType.innerHTML = '<option value="">Select Operator First</option>';

      document.documentElement.style.setProperty("--bgImage",'url("excavator.jpg")');
      defectNotes.value = "";

      resetChecksAndProgress();

      submitBtn.disabled = false;
      submitBtn.textContent = "Complete Inspection";
    }, 1800);

  } catch (error) {
    alert("❌ Submission failed: " + error.message);
    submitBtn.disabled = false;
    submitBtn.textContent = "Complete Inspection";
  }
});

updateProgress();
</script>
</body>
</html>
